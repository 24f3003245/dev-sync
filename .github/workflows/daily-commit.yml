name: Daily Auto Commit

on:
  schedule:
    - cron: '17 14 * * *'   # Daily at 14:17 UTC
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "24f3003245@ds.study.iitm.ac.in"

      - name: Step with email 24f3003245@ds.study.iitm.ac.in
        run: echo "Workflow triggered at $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit $(date)" || echo "No changes"
          git push
